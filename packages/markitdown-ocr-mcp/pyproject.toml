[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-ocr-mcp"
dynamic = ["version"]
description = "Enhanced MCP server for MarkItDown with OCR support, async task management, and SSE notifications"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["markitdown", "mcp", "ocr", "pdf", "docx", "xlsx", "pptx", "llm", "vision", "async"]
authors = [
  { name = "Contributors", email = "noreply@github.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: Implementation :: CPython",
]

dependencies = [
  "mcp~=1.8.0",
  "starlette>=0.27.0",
  "uvicorn>=0.20.0",
  "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
llm = [
  "openai>=1.0.0",
]

[project.urls]
Documentation = "https://github.com/microsoft/markitdown#readme"
Issues = "https://github.com/microsoft/markitdown/issues"
Source = "https://github.com/microsoft/markitdown"

[tool.hatch.version]
path = "src/markitdown_ocr_mcp/__about__.py"

[project.scripts]
markitdown-ocr-mcp = "markitdown_ocr_mcp.__main__:main"

[tool.hatch.envs.types]
extra-dependencies = [
  "mypy>=1.0.0",
]
[tool.hatch.envs.types.scripts]
check = "mypy --install-types --non-interactive {args:src/markitdown_ocr_mcp tests}"

[tool.coverage.run]
source_pkgs = ["markitdown-ocr-mcp", "tests"]
branch = true
parallel = true
omit = [
  "src/markitdown_ocr_mcp/__about__.py",
]

[tool.coverage.paths]
markitdown-ocr-mcp = ["src/markitdown_ocr_mcp", "*/markitdown-ocr-mcp/src/markitdown_ocr_mcp"]
tests = ["tests", "*/markitdown-ocr-mcp/tests"]

[tool.coverage.report]
exclude_lines = [
  "no cov",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]

[tool.hatch.build.targets.sdist]
only-include = ["src/markitdown_ocr_mcp"]

[tool.hatch.build.targets.wheel]
only-include = ["src/markitdown_ocr_mcp"]