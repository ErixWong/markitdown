services:
  markitdown-server:
    image: ericwong/markitdown:0.1.6b2-ocr-server
    ports:
      - "${MARKITDOWN_SERVER_PORT:-8000}:8000"
    environment:
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_SERVER_HOST=0.0.0.0
      - MARKITDOWN_SERVER_PORT=8000
      - MARKITDOWN_OCR_ENABLED=${MARKITDOWN_OCR_ENABLED:-true}
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-}
      - MARKITDOWN_MAX_FILE_SIZE=${MARKITDOWN_MAX_FILE_SIZE:-100MB}
      - MARKITDOWN_CORS_ORIGINS=${MARKITDOWN_CORS_ORIGINS:-*}
      - MARKITDOWN_MCP_STREAMING=${MARKITDOWN_MCP_STREAMING:-false}
      # OCR LLM Vision settings
      - MARKITDOWN_OCR_API_KEY=${MARKITDOWN_OCR_API_KEY:-}
      - MARKITDOWN_OCR_API_BASE=${MARKITDOWN_OCR_API_BASE:-}
      - MARKITDOWN_OCR_MODEL=${MARKITDOWN_OCR_MODEL:-gpt-4o}
    volumes:
      - markitdown-storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

volumes:
  markitdown-storage:
