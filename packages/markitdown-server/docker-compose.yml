services:
  markitdown-server:
    build:
      context: ..
      dockerfile: packages/markitdown-server/Dockerfile
    ports:
      - "${MARKITDOWN_SERVER_PORT:-8000}:8000"
    environment:
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_SERVER_HOST=0.0.0.0
      - MARKITDOWN_SERVER_PORT=8000
      - MARKITDOWN_OCR_ENABLED=${MARKITDOWN_OCR_ENABLED:-false}
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-}
      - MARKITDOWN_MAX_FILE_SIZE=${MARKITDOWN_MAX_FILE_SIZE:-100MB}
      - MARKITDOWN_CORS_ORIGINS=${MARKITDOWN_CORS_ORIGINS:-*}
      - MARKITDOWN_MCP_STREAMING=${MARKITDOWN_MCP_STREAMING:-false}
    volumes:
      - markitdown-storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    profiles:
      - full

  markitdown-api:
    build:
      context: ..
      dockerfile: packages/markitdown-server/Dockerfile
    ports:
      - "${MARKITDOWN_SERVER_PORT:-8000}:8000"
    environment:
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_SERVER_HOST=0.0.0.0
      - MARKITDOWN_SERVER_PORT=8000
      - MARKITDOWN_OCR_ENABLED=${MARKITDOWN_OCR_ENABLED:-false}
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-}
      - MARKITDOWN_MAX_FILE_SIZE=${MARKITDOWN_MAX_FILE_SIZE:-100MB}
      - MARKITDOWN_CORS_ORIGINS=${MARKITDOWN_CORS_ORIGINS:-*}
    volumes:
      - markitdown-storage:/app/storage
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "8000", "--no-mcp"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    profiles:
      - api

  markitdown-mcp:
    build:
      context: ..
      dockerfile: packages/markitdown-server/Dockerfile
    ports:
      - "${MARKITDOWN_SERVER_PORT:-8000}:8000"
    environment:
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_SERVER_HOST=0.0.0.0
      - MARKITDOWN_SERVER_PORT=8000
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-}
      - MARKITDOWN_CORS_ORIGINS=${MARKITDOWN_CORS_ORIGINS:-*}
      - MARKITDOWN_MCP_STREAMING=${MARKITDOWN_MCP_STREAMING:-false}
    volumes:
      - markitdown-storage:/app/storage
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "8000", "--no-api"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    profiles:
      - mcp

volumes:
  markitdown-storage:
