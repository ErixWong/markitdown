version: '3.8'

# MarkItDown API + MCP 双服务部署配置（单镜像模式）
# 使用同一个镜像启动两个独立容器

services:
  # MarkItDown RESTful API Server
  markitdown-api:
    build:
      context: ../..
      dockerfile: packages/markitdown-api/Dockerfile.combined
    ports:
      - "8000:8000"
    environment:
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-your-secret-token-32-chars-min-123}
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_MAX_FILE_SIZE=100MB
      - MARKITDOWN_CORS_ORIGINS=*
    volumes:
      - api-storage:/app/storage
    command: ["markitdown-api", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - markitdown-network

  # MarkItDown MCP HTTP Server (带 OCR 支持)
  markitdown-mcp:
    build:
      context: ../..
      dockerfile: packages/markitdown-api/Dockerfile.combined
    ports:
      - "3001:3001"
    environment:
      - MARKITDOWN_API_KEY=${MARKITDOWN_API_KEY:-your-secret-token-32-chars-min-123}
      - MARKITDOWN_OCR_API_KEY=${MARKITDOWN_OCR_API_KEY:-sk-your-llm-api-key}
      - MARKITDOWN_OCR_MODEL=${MARKITDOWN_OCR_MODEL:-gpt-4o}
      - MARKITDOWN_OCR_API_BASE=${MARKITDOWN_OCR_API_BASE:-https://api.openai.com/v1}
      - MARKITDOWN_OCR_ENABLED=true
      - MARKITDOWN_STORAGE_DIR=/app/storage
      - MARKITDOWN_MAX_FILE_SIZE_MB=100
      - MARKITDOWN_MAX_CONCURRENT=3
    volumes:
      - mcp-storage:/app/storage
    command: ["markitdown-ocr-mcp", "--http", "--host", "0.0.0.0", "--port", "3001"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ || curl -f http://localhost:3001/sse || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - markitdown-network

  # 可选：Nginx 反向代理（统一入口）
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - markitdown-api
      - markitdown-mcp
    networks:
      - markitdown-network
    profiles:
      - with-nginx

volumes:
  api-storage:
    driver: local
  mcp-storage:
    driver: local

networks:
  markitdown-network:
    driver: bridge
