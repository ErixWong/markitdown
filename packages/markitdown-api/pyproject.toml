[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-api"
dynamic = ["version"]
description = "RESTful API server for MarkItDown - Convert files to Markdown via HTTP"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Microsoft Corporation" }
]
keywords = [
    "markdown",
    "conversion",
    "api",
    "rest",
    "http",
    "document",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Text Processing :: Markup :: Markdown",
]

dependencies = [
    "markitdown",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "python-multipart>=0.0.6",
    "aiofiles>=23.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
ocr = [
    "markitdown-ocr",
    "openai>=1.0.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.24.0",
    "ruff>=0.1.0",
]

[project.scripts]
markitdown-api = "markitdown_api:main"

[project.urls]
Homepage = "https://github.com/microsoft/markitdown"
Documentation = "https://github.com/microsoft/markitdown#readme"
Repository = "https://github.com/microsoft/markitdown.git"
Issues = "https://github.com/microsoft/markitdown/issues"

[tool.hatch.version]
path = "src/markitdown_api/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/markitdown_api"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]